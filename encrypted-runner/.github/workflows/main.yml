name: Encrypted Runner

on:
  workflow_dispatch:
    inputs:
      payload:
        description: "JSON payload with usuario/senha/otpExportData"
        required: false
        default: ""
      callback_url:
        description: "Callback URL to receive result JSON"
        required: false
        default: ""

jobs:
  get-eproc-session:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "requirements.txt"

      - name: Install dependencies
        run: uv pip install --system -r requirements.txt

      - name: Run get-eproc-session script
        env:
          HEADLESS: "false"
          RAW_PAYLOAD: ${{ github.event.inputs.payload }}
          RAW_CALLBACK: ${{ github.event.inputs.callback_url }}
          EPROC_USUARIO: ${{ secrets.EPROC_USUARIO }}
          EPROC_SENHA: ${{ secrets.EPROC_SENHA }}
          OTP_EXPORT_DATA: ${{ secrets.OTP_EXPORT_DATA }}
          OTP_PROFILE_MATCH: ${{ secrets.OTP_PROFILE_MATCH }}
          OTP_PROFILE_INDEX: ${{ secrets.OTP_PROFILE_INDEX }}
        run: python scripts/get-session.py
