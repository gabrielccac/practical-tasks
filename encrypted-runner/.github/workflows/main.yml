name: Encrypted Runner

on:
  workflow_dispatch:
    inputs:
      payload:
        description: "Encrypted payload envelope JSON"
        required: true
      callback_url:
        description: "Callback URL to POST script result"
        required: false
        default: ""

jobs:
  get-eproc-session:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run get-eproc-session script
        env:
          RAW_PAYLOAD: ${{ github.event.inputs.payload }}
          RAW_CALLBACK: ${{ github.event.inputs.callback_url }}
          EPROC_PRIVATE_KEY_PEM: ${{ secrets.EPROC_PRIVATE_KEY_PEM }}
        run: python scripts/get-session.py
